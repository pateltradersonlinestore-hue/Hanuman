<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हनुमान AI - Pioneered by Divy Patel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff9933;
            --bg-color: #ffffff;
            --chat-bg: #f0f4f9;
            --text-dark: #1f1f1f;
            --text-light: #444746;
            --border-color: #e3e3e3;
        }

        body {
            font-family: "Google Sans", -apple-system, Roboto, sans-serif;
            background: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: var(--text-dark);
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        header h1 { font-size: 22px; color: var(--text-dark); margin: 0; font-weight: 500; }
        .badge { background: #f0f4f9; color: var(--primary); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        /* --- Chat Area --- */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scrollbar-width: none;
        }

        .message-wrapper { display: flex; gap: 15px; max-width: 100%; }
        .user-wrapper { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
        }
        .ai-avatar { background: #f0f4f9; color: var(--primary); }
        .user-avatar { background: #e3e3e3; color: #555; }

        .message-content {
            max-width: 80%;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .user-message { background: var(--chat-bg); padding: 12px 18px; border-radius: 20px; border-top-right-radius: 4px; }
        
        /* Thinking Box */
        .thinking-process { font-size: 14px; color: #666; background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 3px solid #ccc; font-style: italic; }

        /* --- Tools & Announce Button --- */
        .message-tools {
            display: flex; gap: 10px; margin-top: 10px;
        }
        .tool-btn {
            background: none; border: none; color: #5f6368; font-size: 16px; cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .tool-btn:hover { background: #f0f4f9; color: var(--text-dark); }
        .tool-btn.playing { color: var(--primary); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Image Styling --- */
        .hanuman-generated-image { width: 100%; max-width: 400px; border-radius: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: block; }

        /* --- Input Panel --- */
        .input-wrapper { padding: 10px 20px 20px 20px; }
        
        .input-panel {
            background: var(--chat-bg);
            border-radius: 24px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .model-chip { padding: 6px 14px; border-radius: 16px; font-size: 12px; background: white; border: 1px solid #ddd; cursor: pointer; white-space: nowrap; transition: 0.2s; color: var(--text-light); }
        .model-chip.active { background: #e8f0fe; color: #1a73e8; border-color: transparent; font-weight: 500; }

        #preview-container { display: none; position: relative; width: fit-content; margin-left: 10px; }
        #image-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .remove-img { position: absolute; top: -5px; right: -5px; background: #5f6368; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .input-row { display: flex; align-items: flex-end; gap: 10px; }
        
        textarea {
            flex: 1; background: transparent; border: none; font-size: 16px; outline: none; max-height: 150px; resize: none; padding: 10px 5px; color: var(--text-dark);
        }

        .action-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: #5f6368; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:hover { background: #e3e3e3; }
        .btn-send { color: var(--text-dark); }
        .btn-send:hover { background: #e3e3e3; }
        
        .footer-text { text-align: center; font-size: 11px; color: #888; margin-top: 10px; }
        .status-text { font-size: 12px; color: var(--primary); text-align: center; margin-top: 5px; height: 15px; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>🔱 हनुमान AI</h1>
        <span class="badge">Pioneered by Divy Patel</span>
    </header>

    <div id="chat-history">
        <div class="message-wrapper">
            <div class="avatar ai-avatar">🔱</div>
            <div class="message-content">
                प्रणाम अभय जी! मैं हनुमान हूँ, भारत में निर्मित आपका उन्नत एआई। मैं आपकी कैसे सहायता कर सकता हूँ?
            </div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-panel">
            <div class="options-row">
                <span class="model-chip active" data-model="flux">🎨 Flux Art</span>
                <span class="model-chip" data-model="realism">📸 Realism</span>
                <span class="model-chip" data-model="turbo">⚡ Turbo</span>
                <span class="model-chip" data-model="any-dark">🌑 Any-Dark</span>
            </div>

            <div id="preview-container">
                <img id="image-preview" src="">
                <div class="remove-img" onclick="removeImage()">×</div>
            </div>
            
            <div class="input-row">
                <button class="action-btn" onclick="document.getElementById('file-input').click()" title="फोटो जोड़ें">
                    <i class="fas fa-plus"></i>
                </button>
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">

                <textarea id="user-input" rows="1" placeholder="यहाँ मैसेज टाइप करें..."></textarea>
                
                <button class="action-btn" id="mic-btn" title="बोलकर लिखें">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <button class="action-btn btn-send" id="send-btn" title="भेजें">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        <div class="status-text" id="status-text"></div>
        <div class="footer-text">Created in India | हनुमान एआई गलतियाँ कर सकता है।</div>
    </div>
</div>

<audio id="tts-player" hidden></audio>

<script type="module">
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    const WORKER_URL = "https://shiny-surf-7c27.kanyakumari34660.workers.dev"; 
    const HF_SPACE_ID = "pateltraders55455/Speech"; // आपका हगिंग फेस स्पेस
    
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const ttsPlayer = document.getElementById('tts-player');
    const statusText = document.getElementById('status-text');
    const imageChips = document.querySelectorAll('.model-chip');

    let selectedModel = "flux";
    let base64Image = null;
    let mimeType = null;
    let hfClient = null;

    // हगिंग फेस क्लाइंट को बैकग्राउंड में कनेक्ट करना
    async function initHF() {
        try {
            hfClient = await Client.connect(HF_SPACE_ID);
            console.log("Hugging Face Connected!");
        } catch (e) {
            console.error("HF Connection Error", e);
        }
    }
    initHF();

    // Model Selection
    imageChips.forEach(chip => {
        chip.onclick = () => {
            imageChips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            selectedModel = chip.dataset.model;
        };
    });

    // Image Preview
    window.previewImage = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
                base64Image = e.target.result.split(',')[1];
                mimeType = file.type;
            };
            reader.readAsDataURL(file);
        }
    };

    window.removeImage = () => {
        base64Image = null;
        document.getElementById('preview-container').style.display = 'none';
        document.getElementById('file-input').value = "";
    };

    // Auto-resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight < 150 ? this.scrollHeight : 150) + 'px';
    });

    // --- 1. STT: Direct Hugging Face Mic Logic ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    micBtn.onclick = async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    if (!hfClient) await initHF();
                    statusText.innerText = "हगिंग फेस से टेक्स्ट बदला जा रहा है...";
                    
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    try {
                        const result = await hfClient.predict("/stt", { 
                            audio_filepath: audioBlob,
                            language_choice: "🇮🇳 हिंदी (Hindi)" // डिफ़ॉल्ट हिंदी STT
                        });
                        userInput.value = result.data[0];
                        statusText.innerText = "";
                        sendMessage(); // बोलते ही अपने आप भेज दे
                    } catch (err) {
                        statusText.innerText = "STT त्रुटि: " + err.message;
                    }
                };
                
                mediaRecorder.start();
                isRecording = true;
                micBtn.style.color = "red";
                statusText.innerText = "रिकॉर्डिंग हो रही है... (रोकने के लिए दोबारा दबाएँ)";
            } catch (err) {
                alert("माइक्रोफोन की अनुमति दें!");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.style.color = "#5f6368";
            statusText.innerText = "प्रोसेसिंग...";
        }
    };

    // --- 2. Chat: Cloudflare Worker Logic ---
    async function sendMessage() {
        const prompt = userInput.value.trim();
        if (!prompt && !base64Image) return;

        const userWrapper = document.createElement('div');
        userWrapper.className = 'message-wrapper user-wrapper';
        userWrapper.innerHTML = `
            <div class="avatar user-avatar"><i class="fas fa-user"></i></div>
            <div class="message-content user-message">${prompt || "[इमेज भेजी गई]"}</div>
        `;
        chatHistory.appendChild(userWrapper);
        chatHistory.scrollTop = chatHistory.scrollHeight;

        userInput.value = '';
        userInput.style.height = 'auto';
        
        const payload = {
            prompt: prompt,
            image_model: selectedModel,
            image_data: base64Image,
            image_mime: mimeType
        };
        removeImage();

        const aiWrapper = document.createElement('div');
        aiWrapper.className = 'message-wrapper';
        aiWrapper.innerHTML = `
            <div class="avatar ai-avatar">🔱</div>
            <div class="message-content">
                <span style="color: #888;">हनुमान विचार कर रहे हैं...</span>
            </div>
        `;
        chatHistory.appendChild(aiWrapper);
        chatHistory.scrollTop = chatHistory.scrollHeight;

        try {
            const res = await fetch(`${WORKER_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            let thinking = "";
            let finalOutput = data.reply;

            if (data.reply.includes("<think>")) {
                const parts = data.reply.split("</think>");
                thinking = parts[0].replace("<think>", "").trim();
                finalOutput = parts[1].trim();
            }

            let contentHTML = "";
            if (thinking) {
                contentHTML += `<div class="thinking-process">💭 ${thinking}</div>`;
            }
            contentHTML += `<div>${finalOutput}</div>`;
            
            const cleanTextForTTS = finalOutput.replace(/<[^>]*>/g, ''); 
            const voiceType = data.voice_type;
            
            contentHTML += `
                <div class="message-tools">
                    <button class="tool-btn play-tts-btn" title="आवाज़ में सुनें" data-text="${encodeURIComponent(cleanTextForTTS)}" data-voice="${voiceType}">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button class="tool-btn copy-btn" title="कॉपी करें">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
            `;

            const aiContentDiv = aiWrapper.querySelector('.message-content');
            aiContentDiv.innerHTML = contentHTML;

            const playBtn = aiContentDiv.querySelector('.play-tts-btn');
            playBtn.onclick = () => playTTS(decodeURIComponent(playBtn.dataset.text), playBtn.dataset.voice, playBtn);

            const copyBtn = aiContentDiv.querySelector('.copy-btn');
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(cleanTextForTTS);
                copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => copyBtn.innerHTML = '<i class="far fa-copy"></i>', 2000);
            };

            chatHistory.scrollTop = chatHistory.scrollHeight;

        } catch (err) {
            aiWrapper.querySelector('.message-content').innerText = "क्षमा करें, सर्वर से संपर्क टूट गया है।";
        }
    }

    // --- 3. TTS: Direct Hugging Face Logic ---
    let currentPlayingBtn = null;
    async function playTTS(text, voice, btnElement) {
        if (currentPlayingBtn) {
            currentPlayingBtn.classList.remove('playing');
            ttsPlayer.pause();
            if (currentPlayingBtn === btnElement) {
                currentPlayingBtn = null;
                return; 
            }
        }

        btnElement.classList.add('playing');
        currentPlayingBtn = btnElement;

        try {
            if (!hfClient) await initHF();
            statusText.innerText = "हगिंग फेस से आवाज़ बन रही है...";

            const result = await hfClient.predict("/tts", {
                text: text,
                voice_type: voice
            });
            
            ttsPlayer.src = result.data[0].url;
            ttsPlayer.play();
            statusText.innerText = "";
            
            ttsPlayer.onended = () => {
                btnElement.classList.remove('playing');
                currentPlayingBtn = null;
            };
        } catch (e) {
            btnElement.classList.remove('playing');
            currentPlayingBtn = null;
            statusText.innerText = "TTS त्रुटि!";
            setTimeout(() => statusText.innerText = "", 2000);
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener('keydown', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            sendMessage(); 
        } 
    });
</script>
</body>
</html>
